name: Update Pegasas TOP 5

on:
  schedule:
    - cron: '30 6 * * *'   # 8:30 UTC (9:30 Lietuva) — 30 min po Bright Data run'o
  workflow_dispatch:        # Rankinis paleidimas

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch TOP 5 from Bright Data
        run: node pegasas/fetch-top5-from-brd.js
        env:
          BRD_TOKEN: ${{ secrets.BRD_TOKEN }}

      - name: Commit top5.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pegasas/top5.json
          git diff --staged --quiet || git commit -m "Update Pegasas TOP 5 $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
